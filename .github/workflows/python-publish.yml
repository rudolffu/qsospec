name: Publish qsospec to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Validate release tag and package version
        id: version
        run: |
          python - <<'PY'
          import os
          import re
          import tomllib

          tag = os.environ["GITHUB_REF_NAME"]
          if re.fullmatch(r"v\d+\.\d+\.\d+", tag) is None:
              raise SystemExit(f"Release tag must match vX.Y.Z, got {tag!r}")
          with open("pyproject.toml", "rb") as stream:
              version = tomllib.load(stream)["project"]["version"]
          if tag != f"v{version}":
              raise SystemExit(f"Release tag {tag!r} does not match package version {version!r}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as stream:
              stream.write(f"version={version}\n")
          PY

      - name: Install test and build dependencies
        run: python -m pip install --upgrade ".[dev]"

      - name: Run tests
        env:
          MPLBACKEND: Agg
        run: pytest

      - name: Build release distributions
        run: |
          python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Smoke-test installed wheel and package data
        run: |
          python -m venv /tmp/qsospec-wheel-smoke
          /tmp/qsospec-wheel-smoke/bin/python -m pip install dist/*.whl
          cd /tmp
          /tmp/qsospec-wheel-smoke/bin/python - <<'PY'
          import qsospec

          assert qsospec.__version__ == "${{ steps.version.outputs.version }}"
          assert "vw01_uv" in qsospec.list_iron_templates()
          assert qsospec.load_iron_template("vw01_uv").wave_rest.size > 0
          assert qsospec.load_balmer_template().n_upper.size > 0
          PY

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write

    # Dedicated environments with protections for publishing are strongly recommended.
    # For more information, see: https://docs.github.com/en/actions/deployment/targeting-different-environments/using-environments-for-deployment#deployment-protection-rules
    environment:
      name: pypi
      url: https://pypi.org/project/qsospec/${{ needs.release-build.outputs.version }}/

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
